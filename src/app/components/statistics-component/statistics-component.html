<div class="row g-4 mb-4">
  <div class="col-12 col-sm-6 col-xl-3">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <h6 class="text-muted fw-normal mb-1">Total Employees</h6>
          <h3 class="mb-0 fw-bold">{{ totalEmployees | number }}</h3>
          <span class="text-success small fw-medium">
            <i class="bi bi-arrow-up-short"></i> Active Staff
          </span>
        </div>
        <div class="bg-primary-subtle text-primary rounded p-3 fs-3">
          <i class="bi bi-people-fill"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-sm-6 col-xl-3">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <h6 class="text-muted fw-normal mb-1">Total Departments</h6>
          <h3 class="mb-0 fw-bold">{{ totalDepartments }}</h3>
          <span class="text-muted small fw-normal">Organized Sectors</span>
        </div>
        <div class="bg-success-subtle text-success rounded p-3 fs-3">
          <i class="bi bi-building"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-sm-6 col-xl-3">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <h6 class="text-muted fw-normal mb-1">Task Completion</h6>
          <h3 class="mb-0 fw-bold">{{ taskCompletionRate }}%</h3>
          <div class="progress mt-2" style="height: 6px; width: 120px">
            <div
              class="progress-bar bg-success"
              role="progressbar"
              [style.width.%]="taskCompletionRate"
              [attr.aria-valuenow]="taskCompletionRate"
              aria-valuemin="0"
              aria-valuemax="100"
            ></div>
          </div>
        </div>
        <div class="bg-warning-subtle text-warning rounded p-3 fs-3">
          <i class="bi bi-check2-circle"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="col-12 col-sm-6 col-xl-3">
    <div class="card border-0 shadow-sm h-100">
      <div class="card-body d-flex align-items-center justify-content-between">
        <div>
          <h6 class="text-muted fw-normal mb-1">Active Tasks</h6>
          <h3 class="mb-0 fw-bold">{{ activeTasksCount }}</h3>
          <span class="text-danger small fw-normal">Awaiting Resolution</span>
        </div>
        <div class="bg-danger-subtle text-danger rounded p-3 fs-3">
          <i class="bi bi-kanban"></i>
        </div>
      </div>
    </div>
  </div>
</div>
